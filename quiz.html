<!DOCTYPE html>
<html>
<head>
    <title>Simple Quiz</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            padding: 20px;
        }
        .quiz-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
        }
        h2 {
            color: #333;
        }
        label {
            display: block;
            margin: 8px 0;
            cursor: pointer;
        }
        button {
            margin-top: 15px;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="quiz-box">
    <h2>Quiz</h2>

    <p>1. What is HTML?</p>
    <label><input type="radio" name="q1"> Programming Language</label>
    <label><input type="radio" name="q1"> Markup Language</label>
    <label><input type="radio" name="q1"> Database</label>

    <p>2. What does CSS stand for?</p>
    <label><input type="radio" name="q2"> Computer Style Sheets</label>
    <label><input type="radio" name="q2"> Cascading Style Sheets</label>
    <label><input type="radio" name="q2"> Colorful Style Sheets</label>

    <button>Submit</button>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: left;
            margin-top: 50px;
        }
        input {
            margin: 5px;
            padding: 8px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Grade Calculator</h2>

    <input type="number" id="sub1" placeholder="Enter Subject 1 marks"><br>
    <input type="number" id="sub2" placeholder="Enter Subject 2 marks"><br>
    <input type="number" id="sub3" placeholder="Enter Subject 3 marks"><br>
    <input type="number" id="sub4" placeholder="Enter Subject 4 marks"><br>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

    <script>
        function calculate() {
            let marks = [];
            let total = 0;

           
            for (let i = 1; i <= 4; i++) {
                let value = parseFloat(document.getElementById("sub" + i).value);
                
                if (isNaN(value)) {
                    alert("Please enter all marks correctly!");
                    return;
                }
                
                marks.push(value);
                total += value;
            }

            let average = total / 4;
            let grade;

            
            if (average >= 90) grade = "A+";
            else if (average >= 75) grade = "A";
            else if (average >= 60) grade = "B";
            else if (average >= 50) grade = "C";
            else grade = "Fail";

            
            document.getElementById("result").innerHTML =
                "Total: " + total + "<br>" +
                "Average: " + average.toFixed(2) + "<br>" +
                "Grade: " + grade;
        }
    </script>

</body>
</html>
